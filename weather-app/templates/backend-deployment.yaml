apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: dev-environment
  labels:
    app: weather
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: weather
  template:
    metadata:
      labels:
        app: weather
    spec:
      serviceAccountName: weather-sa

      volumes:
      - name: storage-volume
        persistentVolumeClaim:
          claimName: weather-db-pvc
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "weather-kv-secrets"  

      containers:
      - name: api-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20 
        volumeMounts:
        - name: storage-volume
          mountPath: /data/db
        - name: secrets-store-inline
          mountPath: "/mnt/secrets"
          readOnly: true
          
        ports:
        - containerPort: 80
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: app-settings
              key: DB_URL
        - name: DATABASE_PASS
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD